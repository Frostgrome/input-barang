<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Input Transaksi Barang</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
  <style>
    body { padding: 16px; background: #f0f4f8; min-height: 100vh; }
    .card-form {
      max-width: 540px;
      margin: 0 auto;
      background: white;
      padding: 28px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .choices__inner { background: white !important; border-radius: 4px !important; min-height: 40px !important; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #23d160;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      z-index: 9999;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      text-align: center;
      max-width: 90vw;
      font-size: 0.92rem;
    }
    .toast.error { background: #ff3860; }
    .stok-pill {
      display: inline-block;
      background: #ebfffc;
      color: #257953;
      border: 1px solid #48c774;
      border-radius: 20px;
      padding: 4px 14px;
      font-weight: 700;
      font-size: 0.82rem;
      margin-top: 6px;
    }
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .nav-links a { color: #3273dc; font-size: 0.88rem; text-decoration: none; }
    .nav-links a:hover { text-decoration: underline; }
    .required-star { color: #ff3860; margin-left: 3px; }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>

<div class="card-form">
  <div class="header-row">
    <h3 class="title is-4 mb-0">📝 Input Transaksi</h3>
    <button class="button is-light is-small" onclick="showSettings()" title="Pengaturan URL Apps Script">⚙️ Setup</button>
  </div>

  <!-- Status koneksi -->
  <div id="statusBar" class="notification is-light is-info py-2 px-3 mb-4" style="font-size:.83rem">
    ⏳ Menghubungkan ke database...
  </div>

  <!-- Form -->
  <div class="field">
    <label class="label">Jenis Transaksi</label>
    <div class="select is-fullwidth">
      <select id="jenis">
        <option value="MASUK">📦 BARANG MASUK</option>
        <option value="KELUAR">📤 BARANG KELUAR</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label class="label">Tanggal</label>
    <input class="input" type="date" id="tanggal">
  </div>

  <div class="field">
    <label class="label">Pilih Barang</label>
    <select id="idBarang"></select>
    <div id="stokWrap" style="display:none;margin-top:6px">
      <span class="stok-pill" id="stokPill">Stok: —</span>
    </div>
  </div>

  <div class="field">
    <label class="label">QTY <span style="font-weight:400;color:#888;font-size:.8rem">(jumlah)</span></label>
    <input class="input" type="number" id="qty" placeholder="0" min="1">
  </div>

  <div class="field">
    <label class="label">
      Keterangan <span class="required-star">*</span>
      <span style="font-weight:400;color:#888;font-size:.78rem;margin-left:4px">wajib diisi</span>
    </label>
    <textarea class="textarea" id="keterangan" rows="2" placeholder="Isi keterangan transaksi..."></textarea>
  </div>

  <button class="button is-primary is-fullwidth mt-4" onclick="submitData()" id="btn">
    💾 Simpan Transaksi
  </button>

  <div class="nav-links">
    <a href="transaksi.html">📋 Riwayat Transaksi</a>
    <a href="stok.html">📊 Live Stok</a>
  </div>
</div>

<!-- Modal Setup -->
<div id="modalSetup" class="modal">
  <div class="modal-background" onclick="closeSettings()"></div>
  <div class="modal-card" style="max-width:480px;margin:0 16px">
    <header class="modal-card-head">
      <p class="modal-card-title" style="font-size:1rem">⚙️ Setup URL Apps Script</p>
      <button class="delete" onclick="closeSettings()"></button>
    </header>
    <section class="modal-card-body">
      <p class="mb-3" style="font-size:.88rem">
        Tempel URL Web App Google Apps Script yang sudah di-deploy.<br>
        URL tersimpan di browser ini (localStorage).
      </p>
      <input class="input" type="url" id="apiInput"
             placeholder="https://script.google.com/macros/s/.../exec">
      <p class="mt-2" style="font-size:.76rem;color:#aaa">Lihat README.md untuk cara deploy Apps Script.</p>
    </section>
    <footer class="modal-card-foot" style="gap:8px">
      <button class="button is-primary" onclick="saveSettings()">Simpan & Muat Ulang</button>
      <button class="button" onclick="closeSettings()">Batal</button>
    </footer>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script>
  let choicesInstance;
  let stokCache = {};   // { idBarang: liveStok }

  // ── JSONP (menghindari CORS block) ───────────────────────
  function apiCall(url) {
    return new Promise((resolve, reject) => {
      const name = '_cb' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const s    = document.createElement('script');
      const sep  = url.includes('?') ? '&' : '?';
      s.src = url + sep + 'callback=' + name;
      s.onerror = () => { cleanup(); reject(new Error('Gagal memuat script')); };
      window[name] = (data) => { cleanup(); resolve(data); };
      function cleanup() { delete window[name]; if (s.parentNode) s.parentNode.removeChild(s); }
      document.head.appendChild(s);
    });
  }

  // ── API URL (localStorage) ───────────────────────────────
  const DEFAULT_API = 'https://script.google.com/macros/s/AKfycbym4yUrlggMg35bEVqvueNK3mk-q-d6wB0PeYjKqkC7p_8MziIc8KPMatR1TExrPkdBIQ/exec';
  function getApiUrl() { return localStorage.getItem('apiUrl') || DEFAULT_API; }

  function showSettings() {
    document.getElementById('apiInput').value = getApiUrl();
    document.getElementById('modalSetup').classList.add('is-active');
  }
  function closeSettings() {
    document.getElementById('modalSetup').classList.remove('is-active');
  }
  function saveSettings() {
    const url = document.getElementById('apiInput').value.trim();
    if (!url.startsWith('https://')) { alert('URL tidak valid!'); return; }
    localStorage.setItem('apiUrl', url);
    closeSettings();
    location.reload();
  }

  // ── Init ─────────────────────────────────────────────────
  window.onload = () => {
    document.getElementById('tanggal').valueAsDate = new Date();

    const el = document.getElementById('idBarang');
    choicesInstance = new Choices(el, {
      searchEnabled   : true,
      placeholder     : true,
      placeholderValue: 'Ketik ID atau nama barang...',
      itemSelectText  : '',
      noResultsText   : 'Barang tidak ditemukan',
      noChoicesText   : 'Memuat daftar barang...',
    });

    el.addEventListener('change', updateStokPill);

    loadItems();
  };

  // ── Load barang dari sheet "persiapan" ───────────────────
  async function loadItems() {
    const bar = document.getElementById('statusBar');
    try {
      const items = await apiCall(`${getApiUrl()}?action=getItems`);

      if (items.error) throw new Error(items.error);
      if (!Array.isArray(items) || items.length === 0) {
        bar.className = 'notification is-warning py-2 px-3 mb-4';
        bar.textContent = '⚠️ Sheet "persiapan" kosong. Tambahkan data ID BARANG & NAMA BARANG.';
        return;
      }

      const opts = items.map(item => ({
        value: item.id,
        label: `${item.id} — ${item.nama}`
      }));
      choicesInstance.setChoices(opts, 'value', 'label', true);

      bar.className = 'notification is-success py-2 px-3 mb-4';
      bar.textContent = `✅ Terhubung — ${items.length} barang dimuat`;

      loadStok();
    } catch (err) {
      bar.className = 'notification is-danger py-2 px-3 mb-4';
      bar.textContent = '❌ Gagal terhubung. Klik ⚙️ Setup untuk mengatur URL.';
      console.error(err);
    }
  }

  // ── Load live stok semua barang ──────────────────────────
  async function loadStok() {
    try {
      const data = await apiCall(`${getApiUrl()}?action=getStok`);
      if (Array.isArray(data)) {
        data.forEach(item => { stokCache[item.id] = item.stok; });
      }
      updateStokPill();
    } catch (err) { /* silent */ }
  }

  // ── Tampilkan stok saat ini untuk barang dipilih ─────────
  function updateStokPill() {
    const id   = document.getElementById('idBarang').value;
    const wrap = document.getElementById('stokWrap');
    const pill = document.getElementById('stokPill');
    if (!id) { wrap.style.display = 'none'; return; }

    wrap.style.display = 'block';
    const stok = stokCache[id];
    if (stok !== undefined) {
      pill.textContent = `Stok saat ini: ${stok}`;
      pill.style.background = stok <= 0 ? '#fff5f7' : stok < 5 ? '#fffaeb' : '#ebfffc';
      pill.style.color      = stok <= 0 ? '#cc0f35' : stok < 5 ? '#947600' : '#257953';
      pill.style.borderColor= stok <= 0 ? '#ff3860' : stok < 5 ? '#ffe08a' : '#48c774';
    } else {
      pill.textContent = 'Stok: 0 (belum ada transaksi)';
      pill.style.background = '#f5f5f5';
      pill.style.color = '#888';
      pill.style.borderColor = '#ddd';
    }
  }

  // ── Submit transaksi ─────────────────────────────────────
  async function submitData() {
    const btn        = document.getElementById('btn');
    const idBarang   = document.getElementById('idBarang').value;
    const qty        = document.getElementById('qty').value;
    const keterangan = document.getElementById('keterangan').value.trim();
    const apiUrl     = getApiUrl();

    if (!apiUrl)          { showSettings(); return; }
    if (!idBarang)        { showToast('⚠️ Pilih barang terlebih dahulu!', true); return; }
    if (!qty || qty <= 0) { showToast('⚠️ Isi QTY yang valid!', true); return; }
    if (!keterangan)      { showToast('⚠️ Keterangan wajib diisi!', true); return; }

    btn.classList.add('is-loading');
    btn.disabled = true;

    const params = new URLSearchParams({
      action     : 'addTransaksi',
      jenis      : document.getElementById('jenis').value,
      tanggal    : document.getElementById('tanggal').value,
      idBarang,
      qty,
      keterangan
    });

    try {
      const data = await apiCall(`${apiUrl}?${params}`);

      if (data.success) {
        stokCache[idBarang] = data.liveStok;
        updateStokPill();
        showToast(`✅ Berhasil! Live Stok ${idBarang}: ${data.liveStok}`);
        document.getElementById('qty').value = '';
        document.getElementById('keterangan').value = '';
      } else {
        showToast('❌ Gagal: ' + (data.error || 'Unknown error'), true);
      }
    } catch (err) {
      showToast('❌ Koneksi gagal. Coba lagi.', true);
      console.error(err);
    } finally {
      btn.classList.remove('is-loading');
      btn.disabled = false;
    }
  }

  // ── Toast notifikasi ─────────────────────────────────────
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast' + (isError ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 4000);
  }
</script>
</body>
</html>
